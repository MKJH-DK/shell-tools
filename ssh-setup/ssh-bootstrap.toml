# ssh-bootstrap.toml
# Keep comments on their own lines. The bootstrap script parses a small TOML subset.

environment = ""
vault_dir = ""
shared_config_path = "${VAULT_DIR}/03-personal/04-secrets/01-ssh/shared.conf"
local_key_path = "~/.ssh/keys/id_ed25519_default"
local_bootstrap_config_path = "~/.ssh/config"
local_override_dir = "~/.ssh/local"
device_name = ""
prefer_existing_keys = true
generate_key_if_missing = true

server_alive_interval = 60
server_alive_count_max = 3
tcp_keepalive = true

create_shared_config_if_missing = true
manage_existing_shared_config = true
shared_config_only_if_missing = true
backup_existing_config = true
overwrite_existing_bootstrap_config = true

auto_detect_vault = true
auto_detect_environment = true
dry_run = false
print_public_key = true
auto_install_openssh = false

[hosts.github]
alias = "github.com"
hostname = "github.com"
user = "git"
key = "~/.ssh/keys/id_ed25519"

[hosts.arch]
alias = "arch"
hostname = "192.168.1.93"
user = "admin"
key = "~/.ssh/keys/arch-server"

[search_paths.termux]
vault_roots = ["/data/data/com.termux/files/home/storage/shared/vault", "/storage/emulated/0/vault"]

[search_paths.wsl]
vault_roots = ["/mnt/c/Users/${WINDOWS_USER}/Desktop/mkjh/vault", "/mnt/c/Users/${WINDOWS_USER}/Desktop/mkjh vault", "/mnt/c/Users/${WINDOWS_USER}/Documents/mkjh/vault", "/mnt/c/Users/${WINDOWS_USER}/Documents/mkjh vault"]

[search_paths.linux]
vault_roots = ["${HOME}/vault", "${HOME}/mkjh/vault", "${HOME}/Desktop/mkjh/vault", "${HOME}/Desktop/mkjh vault"]

[existing_keys]
candidates = ["~/.ssh/id_ed25519_default", "~/.ssh/id_ed25519", "~/.ssh/id_rsa", "~/.ssh/id_ecdsa", "~/.ssh/id_ed25519_github", "~/.ssh/id_rsa_github"]
